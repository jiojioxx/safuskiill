  /* ─────────────────────────────────────────
     CREATE TOKEN MODAL
  ───────────────────────────────────────── */
  function CreateTokenModal({ ticker, onClose, onSuccess, t }) {
    const [amount, setAmount] = useState("");
    const [phase, setPhase]   = useState("idle");

    const tokenCount = amount && !isNaN(+amount) && +amount > 0
      ? Math.floor(+amount / 0.0000003).toLocaleString() : "0";

    const handleCreate = () => {
      if (phase !== "idle") return;
      setPhase("waiting");
      setTimeout(() => {
        setPhase("success");
        setTimeout(() => { onClose(); onSuccess(); }, 1000);
      }, 2500);
    };

    const btnContent = () => {
      if (phase==="waiting") return <><div className="spinner"/>{t.cmWaiting}</>;
      if (phase==="success") return t.cmSuccess;
      return t.cmCreateBtn;
    };
    const btnStyle = {
      ...S.createBtn, marginTop:0,
      background: phase==="success" ? "linear-gradient(135deg,#22c55e,#16a34a)" : "linear-gradient(135deg,#d4a017,#c9961a)",
      cursor: phase!=="idle" ? "not-allowed" : "pointer",
      opacity: phase==="waiting" ? .9 : 1,
      transition: "background .4s",
    };

    return (
      <div style={S.ctOverlay} onClick={phase==="idle"?onClose:undefined}>
        <div style={S.ctModal} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div style={S.ctTitle}>{t.cmTitle(ticker)}</div>
            <CloseBtn onClick={onClose}/>
          </div>

          <div style={S.ctDesc}>{t.cmDesc(ticker)}</div>

          {/* Wallet BNB balance */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#141414",border:"1px solid #2a2a2a",borderRadius:10,padding:"10px 14px",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#22c55e",flexShrink:0}}/>
              <span style={{fontSize:12,color:"#6b7280"}}>{t.cmBalance}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14,fontWeight:600,color:"#e0e0e0"}}>0.8432</span>
              <span style={{fontSize:12,color:"#d4a017",fontWeight:600}}>BNB</span>
            </div>
          </div>

          {/* Amount input */}
          <div style={{...S.ctInputWrap,marginBottom:8}}>
            <input style={S.ctInput} placeholder={t.cmAmountPh} type="number" min="0" value={amount} onChange={e=>setAmount(e.target.value)}/>
            <span style={S.ctInputSuffix}>BNB</span>
          </div>
          <div style={{fontSize:12,color:"#555",marginBottom:20,paddingLeft:2}}>
            {t.cmReceive(tokenCount, ticker)}
          </div>

          <button style={btnStyle} onClick={handleCreate} disabled={phase!=="idle"}>
            {btnContent()}
          </button>

          <div style={S.ctFooter}>
            <span style={S.ctFooterL}>{t.cmPayApprox} <strong style={{color:"#e0e0e0"}}>{amount||"0"} BNB</strong></span>
            <span style={S.ctFooterR}>{t.cmDeployCost}</span>
          </div>
        </div>
      </div>
    );
  }

  function Toast({ ticker, onDone, t }) {
    const [step, setStep]       = useState(1);
    const [exiting, setExiting] = useState(false);
    useEffect(() => {
      const a = setTimeout(() => setStep(2), 2500);
      const b = setTimeout(() => setStep(3), 5500);
      const c = setTimeout(() => { setExiting(true); setTimeout(onDone, 400); }, 10500);
      return () => { clearTimeout(a); clearTimeout(b); clearTimeout(c); };
    }, []);
    const steps = [null,
      { icon:<div className="spinner-gold"/>, title:t.t1Title(ticker), desc:t.t1Desc },
      { icon:<div className="spinner-gold"/>, title:t.t2Title, desc:t.t2Desc(ticker) },
      { icon:<span style={{fontSize:22}}>🎉</span>, title:t.t3Title(ticker), desc:t.t3Desc, btn:true },
    ];
    const cur = steps[step]; if (!cur) return null;
    return (
      <div style={S.toastWrap} className={exiting?"toast-exit":"toast-enter"}>
        <div style={S.toastCard}>
          <div style={S.toastIconWrap}>{cur.icon}</div>
          <div style={S.toastBody}>
            <div style={S.toastTitle}>{cur.title}</div>
            <div style={S.toastDesc}>{cur.desc}</div>
            {cur.btn && <button style={S.toastViewBtn}>{t.t3Btn}</button>}
          </div>
        </div>
      </div>
    );
  }

                            >
                              <div style={{display:"flex",alignItems:"center",gap:10}}>
                                <div style={{width:28,height:28,borderRadius:7,background:"#222",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>🤖</div>
                                <div>
                                  <div style={{fontSize:13,color:"#e0e0e0",fontWeight:500}}>{skill.name}</div>
                                  <div style={{fontSize:11,color:"#555",marginTop:1}}>{skill.desc}</div>
                                </div>
                              </div>
                              <div style={{fontSize:11,fontWeight:700,color:"#d4a017",background:"rgba(212,160,23,.1)",border:"1px solid rgba(212,160,23,.2)",borderRadius:5,padding:"2px 7px",flexShrink:0,marginLeft:12}}>{skill.ticker}</div>
                            </div>
                          ))}

                          {/* no results state */}
                          {filtered.length === 0 && (
                            <div style={{padding:"12px 14px",fontSize:13,color:"#555",textAlign:"center"}}>
                              未找到"{skillSearch}"相关技能
                            </div>
                          )}

                          {/* divider + upload entry — always shown */}
                          <div
                            onMouseDown={()=>{ setDropdownOpen(false); setSkillSearch(""); setShowUploadModal(true); }}
                            style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",cursor:"pointer",borderTop:"1px solid #222",transition:"background .12s"}}
                            onMouseEnter={e=>e.currentTarget.style.background="#1f1a0f"}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                          >
                            <div style={{width:28,height:28,borderRadius:7,background:"rgba(212,160,23,.1)",border:"1px solid rgba(212,160,23,.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                              <UploadArrowIcon size={14} color="#d4a017"/>
                            </div>
                            <div>
                              <div style={{fontSize:13,color:"#d4a017",fontWeight:500}}>{t.bindUploadText}</div>
                              <div style={{fontSize:11,color:"#555",marginTop:1}}>{t.bindUploadSub}</div>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* Upload shortcut below (only when no skill selected and no active search) */}
                  {!selectedSkill && !skillSearch && (
                    <div style={{marginTop:8,display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:12,color:"#444"}}>没有合适的技能？</span>
                      <button
                        onClick={()=>setShowUploadModal(true)}
                        style={{background:"transparent",border:"none",cursor:"pointer",fontSize:12,color:"#d4a017",fontFamily:"inherit",padding:0,fontWeight:500,textDecoration:"underline",textUnderlineOffset:2}}
                      >{t.bindUploadText} →</button>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* Website */}
            <div style={S.formGroup}>
              <label style={S.label}>{t.website}</label>
              <input style={inp("website")} placeholder={t.websitePh} onFocus={()=>setFocused("website")} onBlur={()=>setFocused(null)}/>
            </div>

            {/* Twitter */}
            <div style={S.formGroup}>
              <label style={S.label}>{t.twitter}</label>
              <input style={inp("twitter")} placeholder={t.twitterPh} onFocus={()=>setFocused("twitter")} onBlur={()=>setFocused(null)}/>
            </div>

            {/* Fee notice */}
            <div style={{...S.formGroup,marginBottom:28}}>
              <div style={S.feeBox}>
                <span style={S.feeIcon}>💡</span>
                <div style={{flex:1,minWidth:0}}>
                  {/* title row */}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                    <div style={S.feeTitle}>{t.feeTitle}</div>
                    <button
                      onClick={()=>setFeeOpen(o=>!o)}
                      style={{background:"transparent",border:"none",cursor:"pointer",fontSize:11,fontWeight:600,color:"#d4a017",fontFamily:"inherit",padding:"2px 0",letterSpacing:.02,flexShrink:0,marginLeft:12}}
                    >{t.feeToggle(feeOpen)}</button>
                  </div>

                  {/* desc */}
                  <div style={S.feeDesc}>{t.feeDesc()}</div>

                  {/* expandable panel */}
                  <div className={`fee-panel${feeOpen?" open":""}`}>
                    <div style={{marginTop:16,background:"#141414",borderRadius:10,border:"1px solid #2a2a2a",padding:"14px 16px"}}>
                      {/* header */}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                        <span style={{fontSize:12,fontWeight:600,color:"#e0e0e0"}}>{t.feeHeader}</span>
                        <span style={{fontSize:11,color:"#d4a017",fontWeight:600,background:"rgba(212,160,23,.1)",border:"1px solid rgba(212,160,23,.2)",borderRadius:5,padding:"2px 8px"}}>{t.feeTotal}</span>
                      </div>

                      {/* bars */}
                      {t.feeItems.map(({label,pct})=>(
                        <div key={label} style={{marginBottom:12}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                            <span style={{fontSize:12,color:"#9ca3af"}}>{label}</span>
                            <span style={{fontSize:12,fontWeight:700,color:"#d4a017"}}>{pct}%</span>
                          </div>
                          <div className="bar-track">
                            <div className="bar-fill" style={{width: feeOpen ? `${pct}%` : "0%"}}/>
                          </div>
                        </div>
                      ))}

                      {/* locked note */}
                      <div style={{marginTop:10,fontSize:11,color:"#444",display:"flex",alignItems:"center",gap:5}}>
                        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                          <rect x="1.5" y="4.5" width="8" height="5.5" rx="1.5" stroke="#555" strokeWidth="1.1"/>
                          <path d="M3 4.5V3a2.5 2.5 0 015 0v1.5" stroke="#555" strokeWidth="1.1" strokeLinecap="round"/>
                        </svg>
                        {t.feeLocked}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* Create */}
            <button style={S.createBtn} onClick={()=>setShowCreateModal(true)}>
              {t.createBtn}
            </button>
          </div>

          <div style={S.footer}>{t.footer}</div>
        </div>

        {/* MODALS & TOAST */}
        {showUploadModal && <UploadSkillModal onClose={()=>setShowUploadModal(false)} t={t}/>}
        {showCreateModal && (
          <CreateTokenModal ticker={effectiveTicker}
            onClose={()=>setShowCreateModal(false)}
            onSuccess={()=>{ setShowCreateModal(false); setShowToast(true); }}
            t={t}
          />
        )}
        {showClaimModal && <ClaimFeesModal onClose={()=>setShowClaimModal(false)} t={t}/>}
        {showToast && <Toast ticker={effectiveTicker} onDone={()=>setShowToast(false)} t={t}/>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<LaunchToken/>);
</script>
</body>
</html>
