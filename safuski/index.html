      height: 100%;

    </svg>
  );
  const UploadTabIcon = () => (
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M7 1v8M7 1L4.5 3.5M7 1l2.5 2.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
      <path d="M1.5 9.5v2A1.5 1.5 0 003 13h8a1.5 1.5 0 001.5-1.5v-2" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
    </svg>
  );
  const CloseBtn = ({ onClick }) => (
    <button onClick={onClick} style={{ background:"transparent", border:"none", color:"#555", cursor:"pointer", fontSize:20, lineHeight:1, padding:4 }}>✕</button>
  );

  /* ─────────────────────────────────────────
     UPLOAD SKILL MODAL
  ───────────────────────────────────────── */
  function UploadSkillModal({ onClose, t }) {
    const [tab, setTab] = useState("upload");
    const [mFocused, setMFocused] = useState(null);
    const [fileZoneHover, setFileZoneHover] = useState(false);
    const skillFileRef = useRef();
    const mInput = (f) => ({ ...S.input,  ...(mFocused===f ? S.inputFocus : {}) });
    const mLink  = (f) => ({ ...S.linkInput, ...(mFocused===f ? S.inputFocus : {}) });

    return (
      <div style={S.overlay} onClick={onClose}>
        <div style={S.modal} onClick={e=>e.stopPropagation()}>
          <div style={S.modalHeader}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={S.modalTitle}>{t.umTitle}</div>
                <div style={S.modalSub}>{t.umSub("GoPlus AgentGuard")}</div>
              </div>
              <CloseBtn onClick={onClose}/>
            </div>
          </div>

          <div style={S.tabBar}>
            <button style={tab==="upload"?{...S.tab,...S.tabActive}:S.tab} onClick={()=>setTab("upload")}>
              <UploadTabIcon/>{t.umTab1}
            </button>
            <button style={tab==="github"?{...S.tab,...S.tabActive}:S.tab} onClick={()=>setTab("github")}>
              <GitHubIcon color={tab==="github"?"#e0e0e0":"#6b7280"} size={14}/>{t.umTab2}
            </button>
          </div>

          <div style={S.modalBody}>
            {tab==="upload" && (<>
              <div style={S.formGroup}>
                <label style={S.label}>{t.umSkillName}<span style={S.required}>*</span></label>
                <input style={mInput("mName")} placeholder={t.umSkillNamePh} onFocus={()=>setMFocused("mName")} onBlur={()=>setMFocused(null)}/>
              </div>
              <div style={S.formGroup}>
                <label style={S.label}>{t.umDesc}</label>
                <textarea style={{...S.textarea,minHeight:120,...(mFocused==="mDesc"?S.inputFocus:{})}} placeholder={t.umDescPh} onFocus={()=>setMFocused("mDesc")} onBlur={()=>setMFocused(null)}/>
              </div>
              <div style={S.formGroup}>
                <label style={S.label}>{t.umFile}<span style={S.required}>*</span> <span style={{color:"#555",fontWeight:400}}>{t.umFileSub}</span></label>
                <input ref={skillFileRef} type="file" accept=".zip" style={{display:"none"}}/>
                <div style={{...S.skillFileZone,...(fileZoneHover?S.skillFileZoneHover:{})}}
                  onClick={()=>skillFileRef.current.click()}
                  onMouseEnter={()=>setFileZoneHover(true)}
                  onMouseLeave={()=>setFileZoneHover(false)}
                >
                  <UploadArrowIcon color={fileZoneHover?"#d4a017":"#555"} size={32}/>
                  <div style={S.skillFileZoneText}>{t.umDropText}</div>
                  <div style={S.skillFileZoneSub}>{t.umDropSub}</div>
                </div>
              </div>
              <button style={S.modalBtn}><UploadArrowIcon color="#000" size={16}/>{t.umUploadBtn}</button>
            </>)}

            {tab==="github" && (<>
              <div style={S.formGroup}>
                <label style={S.label}>{t.umGhUrl}<span style={S.required}>*</span></label>
                <div style={S.linkWrap}>
                  <span style={S.linkPrefix}><LinkIcon/></span>
                  <input style={mLink("ghUrl")} placeholder={t.umGhUrlPh} onFocus={()=>setMFocused("ghUrl")} onBlur={()=>setMFocused(null)}/>
                </div>
              </div>
              <div style={S.formGroup}>
                <label style={S.label}>{t.umGhName}</label>
                <input style={mInput("ghName")} placeholder={t.umGhNamePh} onFocus={()=>setMFocused("ghName")} onBlur={()=>setMFocused(null)}/>
                <div style={S.fieldHint}>{t.umGhNameHint}</div>
              </div>
              <div style={{...S.formGroup,marginBottom:0}}>
                <label style={S.label}>{t.umGhDesc}</label>
                <textarea style={{...S.textarea,minHeight:110,...(mFocused==="ghDesc"?S.inputFocus:{})}} placeholder={t.umGhDescPh} onFocus={()=>setMFocused("ghDesc")} onBlur={()=>setMFocused(null)}/>
                <div style={S.fieldHint}>{t.umGhDescHint}</div>
              </div>
              <button style={S.modalBtn}><GitHubIcon color="#000" size={16}/>{t.umImportBtn}</button>
            </>)}
          </div>
        </div>
      </div>
    );
  }

  /* ─────────────────────────────────────────
     CREATE TOKEN MODAL
  ───────────────────────────────────────── */
  function CreateTokenModal({ ticker, onClose, onSuccess, t }) {
    const [amount, setAmount] = useState("");
    const [phase, setPhase]   = useState("idle");

    const tokenCount = amount && !isNaN(+amount) && +amount > 0
      ? Math.floor(+amount / 0.0000003).toLocaleString() : "0";

    const handleCreate = () => {
      if (phase !== "idle") return;
      setPhase("waiting");
      setTimeout(() => {
        setPhase("success");
        setTimeout(() => { onClose(); onSuccess(); }, 1000);
      }, 2500);
    };

    const btnContent = () => {
      if (phase==="waiting") return <><div className="spinner"/>{t.cmWaiting}</>;
      if (phase==="success") return t.cmSuccess;
      return t.cmCreateBtn;
    };
    const btnStyle = {
      ...S.createBtn, marginTop:0,
      background: phase==="success" ? "linear-gradient(135deg,#22c55e,#16a34a)" : "linear-gradient(135deg,#d4a017,#c9961a)",
      cursor: phase!=="idle" ? "not-allowed" : "pointer",
      opacity: phase==="waiting" ? .9 : 1,
      transition: "background .4s",
    };

    return (
      <div style={S.ctOverlay} onClick={phase==="idle"?onClose:undefined}>
        <div style={S.ctModal} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div style={S.ctTitle}>{t.cmTitle(ticker)}</div>
            <CloseBtn onClick={onClose}/>
          </div>

          <div style={S.ctDesc}>{t.cmDesc(ticker)}</div>

          {/* Wallet BNB balance */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#141414",border:"1px solid #2a2a2a",borderRadius:10,padding:"10px 14px",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#22c55e",flexShrink:0}}/>
              <span style={{fontSize:12,color:"#6b7280"}}>{t.cmBalance}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14,fontWeight:600,color:"#e0e0e0"}}>0.8432</span>
              <span style={{fontSize:12,color:"#d4a017",fontWeight:600}}>BNB</span>
            </div>
          </div>

          {/* Amount input */}
          <div style={{...S.ctInputWrap,marginBottom:8}}>
            <input style={S.ctInput} placeholder={t.cmAmountPh} type="number" min="0" value={amount} onChange={e=>setAmount(e.target.value)}/>
            <span style={S.ctInputSuffix}>BNB</span>
          </div>
          <div style={{fontSize:12,color:"#555",marginBottom:20,paddingLeft:2}}>
            {t.cmReceive(tokenCount, ticker)}
          </div>

          <button style={btnStyle} onClick={handleCreate} disabled={phase!=="idle"}>
            {btnContent()}
          </button>

          <div style={S.ctFooter}>
            <span style={S.ctFooterL}>{t.cmPayApprox} <strong style={{color:"#e0e0e0"}}>{amount||"0"} BNB</strong></span>
            <span style={S.ctFooterR}>{t.cmDeployCost}</span>
          </div>
        </div>
      </div>
    );
  }

  /* ─────────────────────────────────────────
     TOAST
  ───────────────────────────────────────── */
  function Toast({ ticker, onDone, t }) {
    const [step, setStep]       = useState(1);
    const [exiting, setExiting] = useState(false);
    useEffect(() => {
      const a = setTimeout(() => setStep(2), 2500);
      const b = setTimeout(() => setStep(3), 5500);
      const c = setTimeout(() => { setExiting(true); setTimeout(onDone, 400); }, 10500);
      return () => { clearTimeout(a); clearTimeout(b); clearTimeout(c); };
    }, []);
    const steps = [null,
      { icon:<div className="spinner-gold"/>, title:t.t1Title(ticker), desc:t.t1Desc },
      { icon:<div className="spinner-gold"/>, title:t.t2Title, desc:t.t2Desc(ticker) },
      { icon:<span style={{fontSize:22}}>🎉</span>, title:t.t3Title(ticker), desc:t.t3Desc, btn:true },
    ];
    const cur = steps[step]; if (!cur) return null;
    return (
      <div style={S.toastWrap} className={exiting?"toast-exit":"toast-enter"}>
        <div style={S.toastCard}>
          <div style={S.toastIconWrap}>{cur.icon}</div>
          <div style={S.toastBody}>
            <div style={S.toastTitle}>{cur.title}</div>
            <div style={S.toastDesc}>{cur.desc}</div>
            {cur.btn && <button style={S.toastViewBtn}>{t.t3Btn}</button>}
          </div>
        </div>
      </div>
    );
  }

  /* ─────────────────────────────────────────
     MAIN PAGE
  ───────────────────────────────────────── */
  function LaunchToken() {
    const [lang, setLang]               = useState("zh");
    const [activeNavIdx, setActiveNavIdx] = useState(1);
    const [logoPreview, setLogoPreview] = useState(null);
    const [focused, setFocused]         = useState(null);
    const [showUploadModal, setShowUploadModal] = useState(false);
    const [showCreateModal, setShowCreateModal] = useState(false);
    const [showToast, setShowToast]     = useState(false);
    const [feeOpen, setFeeOpen]         = useState(false);
    const [tickerVal, setTickerVal]     = useState("");
    const fileRef = useRef();

    const t = T[lang];
    const effectiveTicker = tickerVal.trim() || "JIOJIO";

    const handleFileChange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => setLogoPreview(ev.target.result);
      reader.readAsDataURL(file);
    };

    const inp = (f) => ({ ...S.input, ...(focused===f ? S.inputFocus : {}) });

    return (
      <div style={S.root}>
        {/* NAV */}
        <nav style={S.nav}>
          <div style={S.logo}><div style={S.logoIcon}>S</div>SafuSkill</div>
          <div style={S.navLinks}>
            {t.navItems.map((item,i) => (
              <button key={i} style={activeNavIdx===i?{...S.navLink,...S.navLinkActive}:S.navLink} onClick={()=>setActiveNavIdx(i)}>{item}</button>
            ))}
          </div>
          <div style={S.navRight}>
            <button style={{...S.langBtn,...S.langBtnActive}} onClick={()=>setLang(l=>l==="zh"?"en":"zh")}>
              {lang==="zh"?"中文 ▾":"English ▾"}
            </button>
            <button style={S.bellBtn}>🔔</button>
            <div style={S.walletBadge}><div style={S.walletDot}/>0x168a...c6e6</div>
          </div>
        </nav>

        {/* PAGE */}
        <div style={S.page}>
          <div style={S.backRow}><span style={S.backArrow}>←</span><span style={S.backText}>{t.back}</span></div>
          <div style={S.pageTitle}>{t.pageTitle}</div>
          <div style={S.pageSubtitle}>{t.pageSubtitle}</div>

          {/* CARD */}
          <div style={S.card}>
            <div style={S.cardTitle}><span>📋</span> {t.cardTitle}</div>

            {/* Two-col */}
            <div style={S.twoCol}>
              <div style={{...S.uploadZone,...(focused==="upload"?S.uploadZoneHover:{})}}
                onClick={()=>fileRef.current.click()}
                onMouseEnter={()=>setFocused("upload")}
                onMouseLeave={()=>setFocused(null)}
              >
                <input ref={fileRef} type="file" accept="image/png,image/jpeg,image/webp,image/gif" style={{display:"none"}} onChange={handleFileChange}/>
                {logoPreview ? (
                  <img src={logoPreview} alt="preview" style={S.uploadPreviewImg}/>
                ) : (<>
                  <div style={S.uploadIcon}>
                    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
                      <rect x="4" y="8" width="36" height="28" rx="4" stroke="#555" strokeWidth="2"/>
                      <circle cx="15" cy="17" r="3" stroke="#555" strokeWidth="2"/>
                      <path d="M4 30 L13 21 L20 28 L27 20 L40 30" stroke="#555" strokeWidth="2" strokeLinejoin="round"/>
                      <path d="M30 6 L31.5 9.5 L35 11 L31.5 12.5 L30 16 L28.5 12.5 L25 11 L28.5 9.5 Z" fill="#d4a017"/>
                    </svg>
                  </div>
                  <div style={S.uploadHint}>PNG · JPEG · WEBP · GIF<br/><span style={{color:"#444"}}>{t.imgHint}</span></div>
                </>)}
              </div>

              <div style={S.rightCol}>
                <div style={{...S.formGroup,flex:1,display:"flex",flexDirection:"column"}}>
                  <label style={S.label}>{t.tokenName}<span style={S.required}>*</span></label>
                  <input style={{...inp("name"),flex:1}} placeholder={t.tokenNamePh} onFocus={()=>setFocused("name")} onBlur={()=>setFocused(null)}/>
                </div>
                <div style={{...S.formGroup,flex:1,display:"flex",flexDirection:"column",marginBottom:0}}>
                  <label style={S.label}>{t.ticker}<span style={S.required}>*</span></label>
                  <input style={{...inp("symbol"),flex:1}} placeholder={t.tickerPh} value={tickerVal} onChange={e=>setTickerVal(e.target.value)} onFocus={()=>setFocused("symbol")} onBlur={()=>setFocused(null)}/>
                </div>
              </div>
            </div>

            {/* Description */}
            <div style={S.formGroup}>
              <label style={S.label}>{t.desc}</label>
              <textarea style={{...S.textarea,...(focused==="desc"?S.inputFocus:{})}} placeholder={t.descPh} onFocus={()=>setFocused("desc")} onBlur={()=>setFocused(null)}/>
            </div>

            {/* Select Skill */}
            <div style={S.formGroup}>
              <label style={S.label}>{t.selectSkill}<span style={S.required}>*</span></label>
              <div style={S.skillHint}>{t.skillHint}</div>
              <div style={S.searchWrap}>
                <span style={S.searchIcon}><SearchIcon/></span>
                <input style={{...S.searchInput,...(focused==="skill"?S.inputFocus:{})}} placeholder={t.searchPh} onFocus={()=>setFocused("skill")} onBlur={()=>setFocused(null)}/>
              </div>
              <div style={{...S.bindUploadZone,...(focused==="bindUpload"?{borderColor:"#d4a017"}:{})}}
                onClick={()=>setShowUploadModal(true)}
                onMouseEnter={()=>setFocused("bindUpload")}
                onMouseLeave={()=>setFocused(null)}
              >
                <div style={S.bindUploadIcon}><UploadArrowIcon/></div>
                <div style={S.bindUploadText}>{t.bindUploadText}</div>
                <div style={S.bindUploadSub}>{t.bindUploadSub}</div>
              </div>
            </div>

            {/* Website */}
            <div style={S.formGroup}>
              <label style={S.label}>{t.website}</label>
              <input style={inp("website")} placeholder={t.websitePh} onFocus={()=>setFocused("website")} onBlur={()=>setFocused(null)}/>
            </div>

            {/* Twitter */}
            <div style={S.formGroup}>
              <label style={S.label}>{t.twitter}</label>
              <input style={inp("twitter")} placeholder={t.twitterPh} onFocus={()=>setFocused("twitter")} onBlur={()=>setFocused(null)}/>
            </div>

            {/* Fee notice */}
            <div style={{...S.formGroup,marginBottom:28}}>
              <div style={S.feeBox}>
                <span style={S.feeIcon}>💡</span>
                <div style={{flex:1,minWidth:0}}>
                  {/* title row */}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                    <div style={S.feeTitle}>{t.feeTitle}</div>
                    <button
                      onClick={()=>setFeeOpen(o=>!o)}
                      style={{background:"transparent",border:"none",cursor:"pointer",fontSize:11,fontWeight:600,color:"#d4a017",fontFamily:"inherit",padding:"2px 0",letterSpacing:.02,flexShrink:0,marginLeft:12}}
                    >{t.feeToggle(feeOpen)}</button>
                  </div>

                  {/* desc */}
                  <div style={S.feeDesc}>{t.feeDesc()}</div>

                  {/* expandable panel */}
                  <div className={`fee-panel${feeOpen?" open":""}`}>
                    <div style={{marginTop:16,background:"#141414",borderRadius:10,border:"1px solid #2a2a2a",padding:"14px 16px"}}>
                      {/* header */}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                        <span style={{fontSize:12,fontWeight:600,color:"#e0e0e0"}}>{t.feeHeader}</span>
                        <span style={{fontSize:11,color:"#d4a017",fontWeight:600,background:"rgba(212,160,23,.1)",border:"1px solid rgba(212,160,23,.2)",borderRadius:5,padding:"2px 8px"}}>{t.feeTotal}</span>
                      </div>

                      {/* bars */}
                      {t.feeItems.map(({label,pct})=>(
                        <div key={label} style={{marginBottom:12}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                            <span style={{fontSize:12,color:"#9ca3af"}}>{label}</span>
                            <span style={{fontSize:12,fontWeight:700,color:"#d4a017"}}>{pct}%</span>
                          </div>
                          <div className="bar-track">
                            <div className="bar-fill" style={{width: feeOpen ? `${pct}%` : "0%"}}/>
                          </div>
                        </div>
                      ))}

                      {/* locked note */}
                      <div style={{marginTop:10,fontSize:11,color:"#444",display:"flex",alignItems:"center",gap:5}}>
                        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                          <rect x="1.5" y="4.5" width="8" height="5.5" rx="1.5" stroke="#555" strokeWidth="1.1"/>
                          <path d="M3 4.5V3a2.5 2.5 0 015 0v1.5" stroke="#555" strokeWidth="1.1" strokeLinecap="round"/>
                        </svg>
                        {t.feeLocked}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* Create */}
            <button style={S.createBtn} onClick={()=>setShowCreateModal(true)}>
              {t.createBtn}
            </button>
          </div>

          <div style={S.footer}>{t.footer}</div>
        </div>

        {/* MODALS & TOAST */}
        {showUploadModal && <UploadSkillModal onClose={()=>setShowUploadModal(false)} t={t}/>}
        {showCreateModal && (
          <CreateTokenModal ticker={effectiveTicker}
            onClose={()=>setShowCreateModal(false)}
            onSuccess={()=>{ setShowCreateModal(false); setShowToast(true); }}
            t={t}
          />
        )}
        {showToast && <Toast ticker={effectiveTicker} onDone={()=>setShowToast(false)} t={t}/>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<LaunchToken/>);
</script>
</body>
</html>
