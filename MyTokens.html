<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafuSkill — 我的代币</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; font-family: 'Inter','Segoe UI',sans-serif; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes dropIn  { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn   { 0%{transform:scale(.6);opacity:0} 70%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
    @keyframes fadeInUp{ from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pendingPulse { 0%,100%{opacity:.55} 50%{opacity:1} }
    .drop-in  { animation: dropIn  .18s ease forwards; }
    .pop-in   { animation: popIn   .45s cubic-bezier(.34,1.56,.64,1) forwards; }
    .fade-up  { animation: fadeInUp .3s ease forwards; }
    .spinner-w{ width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0; }
    .spinner-g{ width:16px;height:16px;border:2px solid rgba(34,197,94,.2);border-top-color:#22c55e;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0; }
    .spinner-b{ width:14px;height:14px;border:2px solid rgba(96,165,250,.2);border-top-color:#60a5fa;border-radius:50%;animation:spin .9s linear infinite;flex-shrink:0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef, useEffect } = React;

  /* ─────────────────────────────────────
     ICONS
  ───────────────────────────────────── */
  const IconGrid = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <rect x="1" y="1" width="6" height="6" rx="1.5" stroke={color} strokeWidth="1.4"/>
      <rect x="9" y="1" width="6" height="6" rx="1.5" stroke={color} strokeWidth="1.4"/>
      <rect x="1" y="9" width="6" height="6" rx="1.5" stroke={color} strokeWidth="1.4"/>
      <rect x="9" y="9" width="6" height="6" rx="1.5" stroke={color} strokeWidth="1.4"/>
    </svg>
  );
  const IconBag = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M5.5 5V4a2.5 2.5 0 015 0v1" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
      <rect x="1.5" y="5" width="13" height="9.5" rx="2" stroke={color} strokeWidth="1.4"/>
    </svg>
  );
  const IconRocket = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M8 2C8 2 11 3.5 11 8c0 1.5-.5 3-1.5 4L8 14l-1.5-2C5.5 11 5 9.5 5 8c0-4.5 3-6 3-6z" stroke={color} strokeWidth="1.4" strokeLinejoin="round"/>
      <circle cx="8" cy="7.5" r="1.2" stroke={color} strokeWidth="1.2"/>
      <path d="M5 9.5C4 10 2.5 10.5 2 12.5" stroke={color} strokeWidth="1.3" strokeLinecap="round"/>
      <path d="M11 9.5c1 .5 2.5 1 3 3" stroke={color} strokeWidth="1.3" strokeLinecap="round"/>
    </svg>
  );
  const IconDoc = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <rect x="2.5" y="1.5" width="11" height="13" rx="2" stroke={color} strokeWidth="1.4"/>
      <path d="M5 5.5h6M5 8h6M5 10.5h4" stroke={color} strokeWidth="1.3" strokeLinecap="round"/>
    </svg>
  );
  const IconUpload = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M8 2v8M8 2L5.5 4.5M8 2l2.5 2.5" stroke={color} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
      <path d="M2 10v2.5A1.5 1.5 0 003.5 14h9a1.5 1.5 0 001.5-1.5V10" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
    </svg>
  );
  const IconChart = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M2 13.5V2" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
      <path d="M2 13.5h12" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
      <rect x="4" y="8" width="2" height="5.5" rx="1" fill={color} opacity=".7"/>
      <rect x="7.5" y="5" width="2" height="8.5" rx="1" fill={color} opacity=".85"/>
      <rect x="11" y="9.5" width="2" height="4" rx="1" fill={color} opacity=".6"/>
    </svg>
  );
  const IconGear = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="2.2" stroke={color} strokeWidth="1.4"/>
      <path d="M8 1.5v1.2M8 13.3v1.2M1.5 8h1.2M13.3 8h1.2M3.4 3.4l.85.85M11.75 11.75l.85.85M3.4 12.6l.85-.85M11.75 4.25l.85-.85" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
    </svg>
  );
  const IconExternalLink = ({ size=13, color="#555" }) => (
    <svg width={size} height={size} viewBox="0 0 13 13" fill="none">
      <path d="M5.5 2.5H2A1.5 1.5 0 00.5 4v7A1.5 1.5 0 002 12.5h7A1.5 1.5 0 0010.5 11V7.5" stroke={color} strokeWidth="1.3" strokeLinecap="round"/>
      <path d="M7.5 1.5h4v4" stroke={color} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
      <path d="M12 1.5L6.5 7" stroke={color} strokeWidth="1.3" strokeLinecap="round"/>
    </svg>
  );

  const GitHubIcon = ({ size=18, color="#fff" }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={color}>
      <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.3 9.42 7.88 10.95.58.1.79-.25.79-.56v-2.03c-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.69-1.28-1.69-1.04-.71.08-.7.08-.7 1.15.08 1.75 1.18 1.75 1.18 1.02 1.75 2.68 1.24 3.33.95.1-.74.4-1.24.73-1.53-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18a10.9 10.9 0 012.87-.39c.97 0 1.95.13 2.87.39 2.18-1.49 3.14-1.18 3.14-1.18.62 1.58.23 2.75.11 3.04.74.8 1.18 1.83 1.18 3.08 0 4.41-2.69 5.38-5.25 5.67.41.36.78 1.06.78 2.13v3.16c0 .31.21.67.8.56C20.71 21.41 24 17.1 24 12 24 5.65 18.85.5 12 .5z"/>
    </svg>
  );

  /* ─────────────────────────────────────
     MOCK REWARD DATA
     claimStatus: "unclaimed" | "review" | "approved"
     GitHub 来源：OAuth 登录确认 repo 所有权即可自动通过，无需人工
     ZIP 来源：需提交 repo 链接 + 声明，平台人工审核后释放
  ───────────────────────────────────── */
  /* GitHub 来源技能自动入账，ZIP/社区上传须先经「发现认领」审核通过才会出现在此列表 */
  const MOCK_REWARDS_INIT = [
    { id:1, name:"Code Review Agent", icon:"🤖", source:"github",
      claimStatus:"approved", pending:"0.1240 BNB", earned:"0.0234 BNB" },
    { id:2, name:"Translation Agent", icon:"🌐", source:"github",
      claimStatus:"approved", pending:"0.0450 BNB", earned:"0.0156 BNB" },
  ];

  /* ─────────────────────────────────────
     MOCK DISCOVER DATA (他人用你的仓库/ZIP 发行的代币)
  ───────────────────────────────────── */
  const MOCK_DISCOVER_RESULTS = [
    { id:101, name:"AI Writing Assistant", icon:"✍️", token:"AIWA",
      launchedBy:"0xd4f7...88a2", pendingBNB:"0.0312 BNB", launchDate:"2026/03/20" },
    { id:102, name:"Data Viz Skill",       icon:"📊", token:"DVIZ",
      launchedBy:"0x991c...3b5e", pendingBNB:"0.0089 BNB", launchDate:"2026/01/08" },
  ];

  /* ─────────────────────────────────────
     CLAIM MODAL
     steps: idle → connecting → main ←→ apply → submitting → main (status updated)
                                                            → submit_error → retry
     claimStatus: unclaimed | review | approved | rejected
     GitHub 来源：自动通过；ZIP 来源：人工审核
  ───────────────────────────────────── */
  function ClaimModal({ onClose = ()=>{}, pageMode = false, initialTab = "mine", beneficiaryWallet = "" }) {
    const [skills,        setSkills]      = useState(MOCK_REWARDS_INIT);
    const [claimingId,    setClaiming]    = useState(null);
    const [claimedIds,    setClaimed]     = useState(new Set());
    const [claimedToday,    setClaimedToday]    = useState(new Set());
    const [failedClaimIds,  setFailedClaimIds]  = useState(new Set());

    // discover tab state
    const [mainTab,            setMainTab]           = useState(initialTab);
    const [claimingDiscId,     setClaimingDiscId]    = useState(null);
    // GitHub OAuth state: "idle" | "connecting" | "scanning" | "done"
    const [ghAuthStatus,  setGhAuthStatus]  = useState("idle");
    const [ghUser,        setGhUser]        = useState(null); // { login }
    const doGithubLogin = () => {
      setGhAuthStatus("connecting");
      setTimeout(() => {
        // 模拟已登录账号关联的收益钱包
        // 实际场景：后端返回该 GitHub 账号绑定的钱包地址，无则为空字符串
        const mockLinkedWallet = "0x168af1c3e9a74b2fd0c8e3a721bbc6e6"; // 模拟已有绑定钱包
        // const mockLinkedWallet = ""; // 取消注释可演示「无关联钱包，待输入」场景
        setGhUser({ login: "your-github-id" });
        setDiscoverWallet(mockLinkedWallet);
        setDiscoverWalletInput(mockLinkedWallet);
        setDiscoverWalletModified(false);
        setGhAuthStatus("done");
      }, 1200);
    };
    const doGithubLogout = () => {
      setGhAuthStatus("idle");
      setGhUser(null);
      setDiscoverWallet("");
      setDiscoverWalletInput("");
      setDiscoverWalletModified(false);
      setDiscoverWalletEditing(false);
    };
    const [claimedDiscIds,     setClaimedDiscIds]    = useState(new Set());
    const [discoverWallet,       setDiscoverWallet]       = useState(beneficiaryWallet);
    const [discoverWalletInput,  setDiscoverWalletInput]  = useState(beneficiaryWallet);
    // discoverWalletModified: 已绑定账号的一次性修改机会是否已用完
    const [discoverWalletModified, setDiscoverWalletModified] = useState(false);
    // discoverWalletEditing: 是否正处于修改编辑模式
    const [discoverWalletEditing,  setDiscoverWalletEditing]  = useState(false);
    const walletBound    = !!discoverWallet.trim();   // 是否已绑定
    const walletCanEdit  = walletBound && !discoverWalletModified && !discoverWalletEditing;
    const [disputeFields,      setDisputeFields]     = useState({ skillName:"", tokenAddr:"", note:"" });
    const [disputeImages,      setDisputeImages]     = useState([]);
    const [disputeSubmitting,  setDisputeSubmitting] = useState(false);
    const imgInputRef = useRef(null);
    const handleImgPick = (e) => {
      Array.from(e.target.files).forEach(file => {
        if (!file.type.startsWith("image/")) return;
        const reader = new FileReader();
        reader.onload = ev => setDisputeImages(prev => prev.length < 4 ? [...prev, { name:file.name, dataUrl:ev.target.result }] : prev);
        reader.readAsDataURL(file);
      });
      e.target.value = "";
    };
    const [disputes,           setDisputes]          = useState([
      { id:"dsp0", skillName:"Data Science Helper", tokenAddr:"0x4a7c...f3e1",
        status:"rejected", rejectReason:"未能核实该 ZIP 文件与您 GitHub 账号的关联性，请确认您是否为该 ZIP 文件的原始上传者，并在补充说明中提供可验证的关联证明" },
    ]);

    const busy     = claimingId !== null;
    const canClose = !busy;

    // ZIP skill unclaimed/rejected → navigate to discover ZIP tab
    const goToZipClaim = () => { setMainTab("discover"); setDiscoverMode("zip"); };

    const claimReward = (id) => {
      const skill = skills.find(s => s.id === id);
      const pendingAmt = parseFloat(skill?.pending || "0");
      // already handled, or another claim in flight → ignore
      if (claimingId || claimedIds.has(id) || claimedToday.has(id) || failedClaimIds.has(id)) return;
      setClaiming(id);
      setTimeout(() => {
        if (pendingAmt < 0.1) {
          // below minimum → show failure state after loading
          setFailedClaimIds(prev => new Set([...prev, id]));
        } else {
          setClaimed(prev => new Set([...prev, id]));
          setClaimedToday(prev => new Set([...prev, id]));
        }
        setClaiming(null);
      }, 1800);
    };

    const S = {
      overlay: { position:"fixed", inset:0, background:"rgba(0,0,0,.8)", zIndex:800,
        display:"flex", alignItems:"center", justifyContent:"center", padding:20 },
      modal: { background:"#161616", borderRadius:14, border:"1px solid #222",
        width:"100%", maxWidth:480, boxShadow:"0 24px 60px rgba(0,0,0,.8)", overflow:"hidden" },
      hdr: { padding:"22px 24px 0", display:"flex", justifyContent:"space-between", alignItems:"flex-start" },
      body: { padding:"18px 24px 24px" },
      title: { fontSize:17, fontWeight:700, color:"#fff", marginBottom:4 },
      sub:   { fontSize:12, color:"#555" },
      closeBtn: { background:"transparent", border:"none", color:"#444", cursor:"pointer",
        fontSize:18, lineHeight:1, padding:4, marginLeft:12, flexShrink:0 },
    };

    const closeBtn = !pageMode ? <button style={S.closeBtn} onClick={onClose}>✕</button> : null;

    const steps = (<>
            <div style={S.hdr}>
              <div>
                <div style={S.title}>开发者收益认领</div>
                <div style={S.sub}>认领您的技能交易税收益</div>
              </div>
              {closeBtn}
            </div>
            <div style={S.body}>

              {/* Tab switcher */}
              <div style={{display:"flex",gap:2,background:"#111",borderRadius:9,padding:3,marginBottom:16,border:"1px solid #1a1a1a"}}>
                {[["mine","领取收益"],["discover","发现认领"]].map(([key,label])=>(
                  <button key={key} onClick={()=>setMainTab(key)}
                    style={{flex:1,padding:"7px",borderRadius:7,border:"none",fontSize:12,fontWeight:mainTab===key?700:400,cursor:"pointer",fontFamily:"inherit",
                      background:mainTab===key?"#1e1e1e":"transparent",
                      color:mainTab===key?"#d4a017":"#555",transition:"all .15s"}}>
                    {label}
                  </button>
                ))}
              </div>

              {/* ─── 我发布的技能 ─── */}
              {mainTab==="mine" && (<>
                {/* 钱包未绑定提醒 */}
                {!beneficiaryWallet && (
                  <div style={{display:"flex",alignItems:"center",gap:9,background:"rgba(245,158,11,.06)",border:"1px solid rgba(245,158,11,.2)",borderRadius:9,padding:"10px 13px",marginBottom:14}}>
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style={{flexShrink:0}}>
                      <rect x="1.5" y="4.5" width="13" height="9" rx="1.5" stroke="#f59e0b" strokeWidth="1.3"/>
                      <path d="M1.5 7.5h13" stroke="#f59e0b" strokeWidth="1.3"/>
                      <circle cx="11.5" cy="10" r="1" fill="#f59e0b"/>
                      <path d="M4.5 2.5h7" stroke="#f59e0b" strokeWidth="1.3" strokeLinecap="round"/>
                    </svg>
                    <span style={{fontSize:12,color:"#c47f0a",flex:1}}>收益钱包未绑定，领取的 BNB 将无法到账。请前往「我的代币」绑定受益人钱包地址。</span>
                  </div>
                )}
                {/* 领取规则 */}
                <div style={{display:"flex",alignItems:"center",gap:10,background:"#111",border:"1px solid #1e1e1e",borderRadius:8,padding:"8px 12px",marginBottom:14,flexWrap:"wrap",gap:8}}>
                  <span style={{fontSize:11,color:"#444"}}>GitHub 来源自动入账</span>
                  <span style={{width:1,height:11,background:"#222",flexShrink:0}}/>
                  <span style={{fontSize:11,color:"#444"}}>每代币每日限领 1 次</span>
                  <span style={{width:1,height:11,background:"#222",flexShrink:0}}/>
                  <span style={{fontSize:11,color:"#444"}}>最低 <span style={{color:"#d4a017",fontWeight:600}}>0.1 BNB</span> 方可领取</span>
                  <span style={{width:1,height:11,background:"#222",flexShrink:0}}/>
                  <span style={{fontSize:11,color:"#444"}}>ZIP 技能须先通过
                    <span onClick={goToZipClaim} style={{color:"#d4a017",cursor:"pointer",marginLeft:3}}>发现认领 →</span>
                  </span>
                </div>
                {skills.map(r => {
                  const isClaiming = claimingId === r.id;
                  const isClaimed  = claimedIds.has(r.id);
                  const isRejected = r.claimStatus === "rejected";
                  return (
                    <div key={r.id} style={{padding:"12px 0",borderBottom:"1px solid #1a1a1a",background:isRejected?"rgba(239,68,68,.02)":"transparent"}}>
                      <div style={{display:"flex",alignItems:"center",gap:11}}>
                        <div style={{width:34,height:34,borderRadius:9,background:isRejected?"rgba(239,68,68,.07)":"#1a1a1a",border:`1px solid ${isRejected?"rgba(239,68,68,.18)":"#222"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>
                          {r.icon}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:500,color:"#d0d0d0",marginBottom:2}}>{r.name}</div>
                          <div style={{fontSize:11,color:"#3a3a3a"}}>{r.source==="zip"?"社区上传":"GitHub 来源"} · 累计 {r.earned}</div>
                        </div>
                        {r.claimStatus==="unclaimed" && r.source==="zip" && (
                          <button onClick={goToZipClaim}
                            style={{fontSize:12,fontWeight:600,color:"#d4a017",background:"rgba(212,160,23,.07)",border:"1px solid rgba(212,160,23,.18)",borderRadius:7,padding:"5px 13px",cursor:"pointer",fontFamily:"inherit",flexShrink:0,whiteSpace:"nowrap"}}
                            onMouseOver={e=>e.currentTarget.style.background="rgba(212,160,23,.14)"}
                            onMouseOut={e=>e.currentTarget.style.background="rgba(212,160,23,.07)"}>
                            前往认领 →
                          </button>
                        )}
                        {r.claimStatus==="review" && (
                          <div style={{fontSize:11,color:"#7a6020",background:"rgba(212,160,23,.06)",border:"1px solid rgba(212,160,23,.14)",borderRadius:6,padding:"4px 11px",flexShrink:0,display:"flex",alignItems:"center",gap:5}}>
                            <div className="spinner-g" style={{width:9,height:9,borderWidth:1.5,borderTopColor:"#a07012",borderColor:"rgba(160,112,18,.2)"}}/>
                            审核中
                          </div>
                        )}
                        {r.claimStatus==="rejected" && (
                          <button onClick={goToZipClaim}
                            style={{fontSize:12,fontWeight:600,color:"#ef4444",background:"rgba(239,68,68,.06)",border:"1px solid rgba(239,68,68,.18)",borderRadius:7,padding:"5px 13px",cursor:"pointer",fontFamily:"inherit",flexShrink:0,whiteSpace:"nowrap"}}
                            onMouseOver={e=>e.currentTarget.style.background="rgba(239,68,68,.12)"}
                            onMouseOut={e=>e.currentTarget.style.background="rgba(239,68,68,.06)"}>
                            重新申请 →
                          </button>
                        )}
                        {r.claimStatus==="approved" && (()=>{
                          const pendingAmt  = parseFloat(r.pending);
                          const belowMin    = pendingAmt < 0.1;
                          const todayDone   = claimedToday.has(r.id);
                          const isFailed    = failedClaimIds.has(r.id);
                          const btnDisabled = !!claimingId || todayDone || isFailed;
                          if (isClaimed) return (
                            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                              <div style={{fontSize:11,color:"#22c55e",display:"flex",alignItems:"center",gap:4}}>
                                <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4.5" fill="#22c55e"/><path d="M2.5 5l1.6 1.6L7.5 3" stroke="#fff" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                已领取
                              </div>
                              <div style={{fontSize:10,color:"#3a5a3a",display:"flex",alignItems:"center",gap:3}}>
                                <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
                                  <circle cx="4.5" cy="4.5" r="4" stroke="#3a5a3a" strokeWidth="1.1"/>
                                  <path d="M4.5 2.8v2l1.2 1.2" stroke="#3a5a3a" strokeWidth="1.1" strokeLinecap="round" strokeLinejoin="round"/>
                                </svg>
                                预计 24h 内到账
                              </div>
                            </div>
                          );
                          const btnLabel = isClaiming ? <><div className="spinner-g" style={{width:10,height:10,borderWidth:1.5}}/>结算中</>
                                         : isFailed   ? "领取失败"
                                         : todayDone  ? "今日已领"
                                         : "领取";
                          const btnColor = isClaiming ? "#22c55e"
                                         : isFailed   ? "#ef4444"
                                         : btnDisabled ? "#333" : "#22c55e";
                          const btnBg    = isClaiming ? "transparent"
                                         : isFailed   ? "rgba(239,68,68,.07)"
                                         : btnDisabled ? "#161616" : "rgba(34,197,94,.12)";
                          const btnBorder= isFailed   ? "rgba(239,68,68,.22)"
                                         : btnDisabled ? "#222" : "rgba(34,197,94,.25)";
                          return (

                  {(()=>{
                    const disabled = disputeSubmitting || !discoverWallet.trim() || !disputeFields.skillName.trim() || !disputeFields.tokenAddr.trim() || !disputeFields.note.trim();
                    const submit = () => {
                      const newId = "dsp"+Date.now();
                      setDisputeSubmitting(true);
                      const entry = { id:newId, skillName:disputeFields.skillName, tokenAddr:disputeFields.tokenAddr, status:"reviewing", rejectReason:"" };
                      setDisputes(prev=>[...prev, entry]);
                      setDisputeFields({skillName:"",tokenAddr:"",note:""});
                      setDisputeImages([]);
                      setDisputeSubmitting(false);
                      setTimeout(()=>setDisputes(prev=>prev.map(d=>d.id===newId?{...d,status:"approved"}:d)), 3000);
                    };
                    return (<>
                      <button onClick={submit} disabled={disabled}
                        style={{width:"100%",marginTop:4,padding:"10px",borderRadius:9,border:"none",fontSize:13,fontWeight:700,cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",

          >
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
              <circle cx="5.5" cy="5.5" r="5" stroke="currentColor" strokeWidth="1.2"/>
              <path d="M5.5 5v3" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
              <circle cx="5.5" cy="3.2" r=".7" fill="currentColor"/>
            </svg>
            领取条件
          </button>
        </div>

        {/* Card list */}
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {downloads.map(dl => <DownloadCard key={dl.id} dl={dl}/>)}
        </div>

        {/* Conditions modal */}
        {showInfo && <AirdropConditionsModal onClose={() => setShowInfo(false)}/>}
      </div>
    );
  }

  /* ─────────────────────────────────────
     VERIFIED AUTHOR CARD
  ───────────────────────────────────── */
  const ShieldCheckIcon = ({ size=15, color="#4ade80" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M8 1.5L2.5 4v3.8C2.5 11.1 4.9 13.8 8 14.5c3.1-.7 5.5-3.4 5.5-6.7V4L8 1.5z"
        stroke={color} strokeWidth="1.35" strokeLinejoin="round"/>
      <path d="M5.5 8.2l1.6 1.6L10.8 6"
        stroke={color} strokeWidth="1.35" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );

  const ShieldAlertIcon = ({ size=15, color="#f59e0b" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M8 1.5L2.5 4v3.8C2.5 11.1 4.9 13.8 8 14.5c3.1-.7 5.5-3.4 5.5-6.7V4L8 1.5z"
        stroke={color} strokeWidth="1.35" strokeLinejoin="round"/>
      <path d="M8 6v3" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
      <circle cx="8" cy="10.8" r=".7" fill={color}/>
    </svg>
  );

  const ShieldClockIcon = ({ size=15, color="#60a5fa" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M8 1.5L2.5 4v3.8C2.5 11.1 4.9 13.8 8 14.5c3.1-.7 5.5-3.4 5.5-6.7V4L8 1.5z"
        stroke={color} strokeWidth="1.35" strokeLinejoin="round"/>
      <circle cx="8" cy="8.5" r="2.6" stroke={color} strokeWidth="1.2"/>
      <path d="M8 7.2v1.5l.9.9" stroke={color} strokeWidth="1.1" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );

  const WalletIconYellow = ({ size=15, color="#f59e0b" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <rect x="1.5" y="4.5" width="13" height="9" rx="1.5" stroke={color} strokeWidth="1.3"/>
      <path d="M1.5 7.5h13" stroke={color} strokeWidth="1.3"/>
      <circle cx="11.5" cy="10" r="1" fill={color}/>
      <path d="M4.5 2.5h7" stroke={color} strokeWidth="1.3" strokeLinecap="round"/>
    </svg>
  );

  function DataRow({ label, value, hasBorder, muted }) {
    return (
      <div style={{
        display:"flex", justifyContent:"space-between", alignItems:"center",
        padding:"9px 0",
        borderBottom: hasBorder ? "1px solid #242424" : "none",
      }}>
        <span style={{ fontSize:13, color:"#777" }}>{label}</span>
        <span style={{ fontSize:13, color: muted ? "#444" : "#fff", fontWeight:500 }}>{value}</span>
      </div>
    );
  }

  function VerifiedAuthorCard({ verifyStatus="unverified", earlyApplied=false, walletAddress="", taxRate="1%", devFundShare="70%", onVerify=()=>{} }) {
    const [editing,       setEditing]       = useState(false);
    const [walletVal,     setWalletVal]     = useState(walletAddress);
    const [inputVal,      setInputVal]      = useState(walletAddress);
    const [walletHov,     setWalletHov]     = useState(false);
    const [walletChanged, setWalletChanged] = useState(false);

    const verified = verifyStatus === "verified";
    // 审核中状态只对提前认证申请的用户显示，普通用户直接显示未验证
    const pending  = verifyStatus === "pending" && earlyApplied;

    const dotColor   = verified ? "#4ade80" : pending ? "#60a5fa" : "#f59e0b";
    const dotGlow    = verified ? "rgba(74,222,128,.5)" : pending ? "rgba(96,165,250,.5)" : "rgba(245,158,11,.4)";
    const avatarGrad = verified
      ? "linear-gradient(135deg,#22c55e,#16a34a)"
      : pending
      ? "linear-gradient(135deg,#1e3a5f,#1e2a4a)"
      : "linear-gradient(135deg,#2a2a2a,#1e1e1e)";
    const avatarGlow = verified
      ? "0 0 0 3px rgba(34,197,94,.15)"
      : pending
      ? "0 0 0 3px rgba(96,165,250,.12)"
      : "0 0 0 3px rgba(100,100,100,.12)";

    const statusLabel = verified ? "已验证作者" : pending ? "验证审核中" : "未验证作者";

    return (
      <div style={{
        background:"#1a1a1a", borderRadius:12,
        border:`1px solid ${pending ? "rgba(96,165,250,.18)" : "#242424"}`,
        padding:20,
        width:300, flexShrink:0, boxSizing:"border-box",
        fontFamily:"inherit",
      }}>

        {/* 验证状态 */}
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:18 }}>
          {verified
            ? <ShieldCheckIcon size={15} color="#4ade80"/>
            : pending
            ? <ShieldClockIcon size={15} color="#60a5fa"/>
            : <ShieldAlertIcon size={15} color="#f59e0b"/>}
          <span style={{ fontSize:14, fontWeight:600, color:"#fff", letterSpacing:.1 }}>
            {statusLabel}
          </span>
          {pending
            ? <div className="spinner-b" style={{ marginLeft:"auto" }}/>
            : <div style={{
                marginLeft:"auto", width:7, height:7, borderRadius:"50%",
                background:dotColor, boxShadow:`0 0 6px ${dotGlow}`,
              }}/>
          }
        </div>

        {/* 头像 */}
        <div style={{ marginBottom:18 }}>
          <div style={{
            width:44, height:44, borderRadius:"50%",
            background: avatarGrad,
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow: avatarGlow,
            animation: pending ? "pendingPulse 2s ease-in-out infinite" : "none",
          }}>
            {verified ? (
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M9 3.5v11M3.5 9h11" stroke="#fff" strokeWidth="2" strokeLinecap="round"/>
              </svg>
            ) : pending ? (
              /* 时钟图标 */
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <circle cx="9" cy="9" r="6.5" stroke="#60a5fa" strokeWidth="1.6"/>
                <path d="M9 5.5v4l2.5 2" stroke="#60a5fa" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            ) : (
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M5.5 5.5l7 7M12.5 5.5l-7 7" stroke="#555" strokeWidth="1.8" strokeLinecap="round"/>
              </svg>
            )}
          </div>
        </div>

        {/* pending 状态提示 */}
        {pending && (
          <div style={{
            display:"flex", alignItems:"flex-start", gap:8,
            background:"rgba(96,165,250,.05)", border:"1px solid rgba(96,165,250,.18)",
            borderRadius:9, padding:"10px 12px", marginBottom:14,
          }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ flexShrink:0, marginTop:1 }}>
              <circle cx="7" cy="7" r="6.2" stroke="#60a5fa" strokeWidth="1.3"/>
              <path d="M7 6.5v3.5" stroke="#60a5fa" strokeWidth="1.3" strokeLinecap="round"/>
              <circle cx="7" cy="4.8" r=".7" fill="#60a5fa"/>
            </svg>
            <div>
              <div style={{ fontSize:12, fontWeight:600, color:"#60a5fa", marginBottom:3 }}>验证申请审核中</div>
              <div style={{ fontSize:11, color:"#3a5a8a", lineHeight:1.6 }}>
                您的申请已提交，平台正在审核中，请耐心等待。为避免重复处理，<span style={{ color:"#7ab0e8", fontWeight:600 }}>请勿再次提交申请</span>。
              </div>
            </div>
          </div>
        )}

        {/* 每笔交易收益 */}
        <div style={{ fontSize:12, color:"#555", marginBottom:4, letterSpacing:.05 }}>每笔交易收益</div>
        <DataRow label="税率"           value={taxRate}         hasBorder={true}/>
        <DataRow label="开发者基金份额" value={devFundShare}    hasBorder={false} muted={!verified}/>

        {/* Divider */}
        <div style={{ height:1, background:"#222", margin:"14px 0" }}/>

        {/* 受益人钱包 header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:9 }}>
          <span style={{ fontSize:12, color:"#555" }}>受益人钱包</span>
          {!editing && !pending && (verified
            ? (!walletChanged && (
                <span
                  onClick={()=>{ setInputVal(walletVal); setEditing(true); }}
                  style={{ fontSize:12, color:"#d4a017", fontWeight:600, cursor:"pointer" }}
                  onMouseOver={e=>e.currentTarget.style.opacity=".7"}
                  onMouseOut={e=>e.currentTarget.style.opacity="1"}>
                  修改
                </span>
              ))
            : (
                <span
                  onClick={onVerify}
                  style={{ fontSize:12, color:"#f59e0b", fontWeight:600, cursor:"pointer", letterSpacing:.05 }}
                  onMouseOver={e=>e.currentTarget.style.opacity=".7"}
                  onMouseOut={e=>e.currentTarget.style.opacity="1"}>
                  认证 →
                </span>
              )
          )}
        </div>

        {/* 编辑模式 */}
        {editing ? (
          <div>
            <input
              value={inputVal}
              onChange={e=>setInputVal(e.target.value)}
              placeholder="输入钱包地址 0x..."
              autoFocus
              style={{
                width:"100%", background:"#111",
                border:"1px solid rgba(212,160,23,.45)",
                borderRadius:8, padding:"8px 12px",
                fontSize:12, color:"#e0e0e0", outline:"none",
                fontFamily:"'SF Mono','Fira Code','Consolas',monospace",
                boxSizing:"border-box", letterSpacing:.3, marginBottom:8,
              }}
            />
            <div style={{ display:"flex", gap:8 }}>
              <button
                onClick={()=>{ setWalletVal(inputVal.trim()); setWalletChanged(true); setEditing(false); }}
                style={{ flex:1, padding:"7px", background:"linear-gradient(135deg,#d4a017,#c9961a)",
                  border:"none", borderRadius:7, fontSize:12, fontWeight:700,
                  color:"#000", cursor:"pointer", fontFamily:"inherit" }}>
                确认
              </button>
              <button
                onClick={()=>setEditing(false)}
                style={{ flex:1, padding:"7px", background:"transparent",
                  border:"1px solid #2e2e2e", borderRadius:7, fontSize:12,
                  color:"#666", cursor:"pointer", fontFamily:"inherit" }}>
                取消
              </button>
            </div>
          </div>
        ) : walletVal ? (
          /* 已绑定钱包 */
          <div
            onMouseEnter={()=>setWalletHov(true)}
            onMouseLeave={()=>setWalletHov(false)}
            style={{
              display:"flex", alignItems:"center", gap:9,
              background: walletHov ? "#1e1e1e" : "#111",
              border:`1px solid ${walletHov?"#2e2e2e":"#1c1c1c"}`,
              borderRadius:8, padding:"9px 12px",
              transition:"background .15s, border-color .15s",
            }}
          >
            <WalletIconYellow size={15} color="#f59e0b"/>
            <span style={{
              flex:1, fontSize:12, color:"#ddd",
              fontFamily:"'SF Mono','Fira Code','Consolas',monospace", letterSpacing:.3,
            }}>
              {walletVal}
            </span>
            <div style={{ opacity:walletHov?1:.4, transition:"opacity .15s", display:"flex", alignItems:"center", cursor:"pointer" }}>
              <IconExternalLink size={12} color={walletHov?"#d4a017":"#555"}/>
            </div>
          </div>
        ) : (
          /* 未绑定 */
          <div
            onClick={verified && !walletChanged ? ()=>{ setInputVal(""); setEditing(true); } : undefined}
            style={{
              display:"flex", alignItems:"center", gap:9,
              background:"#111", border:"1px dashed #252525",
              borderRadius:8, padding:"9px 12px",
              cursor: verified && !walletChanged ? "pointer" : "default",
              transition:"border-color .15s",
            }}
            onMouseOver={verified && !walletChanged ? e=>e.currentTarget.style.borderColor="rgba(212,160,23,.35)" : undefined}
            onMouseOut={verified && !walletChanged ? e=>e.currentTarget.style.borderColor="#252525" : undefined}
          >
            <WalletIconYellow size={15} color="#333"/>
            <span style={{ fontSize:12, color:"#444", fontStyle:"italic" }}>
              {verified ? "点击绑定收益钱包" : pending ? "审核通过后自动绑定" : "完成认证后自动绑定"}
            </span>
          </div>
        )}

      </div>
    );
  }

  /* ─────────────────────────────────────
     MAIN PAGE
  ───────────────────────────────────── */
  function MyTokens() {
    const [activeNav,      setActiveNav]      = useState("tokens");
    const [selectedId,     setSelectedId]     = useState(MOCK_TOKENS[0].id);
    const [rewardsInitTab, setRewardsInitTab] = useState("mine");
    const tokens = MOCK_TOKENS;
    const selectedToken = tokens.find(t => t.id === selectedId) || tokens[0];

    const goToRewardsDiscover = () => { setRewardsInitTab("discover"); setActiveNav("rewards"); };

    const isDownloads = activeNav === "downloads";
    const isRewards   = activeNav === "rewards";
    const isTokens    = !isDownloads && !isRewards;

    const PAGE_TITLES = {
      tokens:    { h1:"我的代币",  sub:`已发射 ${tokens.length} 个代币` },
      downloads: { h1:"我的下载",  sub:`已下载 ${MOCK_DOWNLOADS.length} 个技能` },
      rewards:   { h1:"领取收益",  sub:"认领您的开发者收益" },
    };
    const { h1, sub } = PAGE_TITLES[activeNav] || PAGE_TITLES.tokens;

    return (
      <div style={{
        display: "flex",
        minHeight: "100vh",
        background: "#0d0d0d",
        color: "#e0e0e0",
      }}>
        {/* Sidebar */}
        <Sidebar active={activeNav} onNav={setActiveNav}/>

        {/* Main */}
        <main style={{
          flex: 1,
          minWidth: 0,
          display: "flex",
          flexDirection: "column",
        }}>
          {/* Top bar */}
          <div style={{
            display: "flex",
            alignItems: "flex-end",
            justifyContent: "space-between",
            padding: "36px 36px 28px",
            borderBottom: "1px solid #1a1a1a",
          }}>
            <div>
              <h1 style={{ fontSize:26, fontWeight:700, color:"#fff", marginBottom:4, letterSpacing:-.2 }}>
                {h1}
              </h1>
              <p style={{ fontSize:13, color:"#555" }}>{sub}</p>
            </div>

          </div>

          {/* Content area */}
          {isDownloads && <DownloadsView/>}
          {isRewards   && <ClaimModal pageMode={true} initialTab={rewardsInitTab} beneficiaryWallet={selectedToken.wallet}/>}
          {isTokens    && (
            <div style={{ padding:"28px 36px", flex:1, display:"flex", gap:24, alignItems:"flex-start" }}>
              {/* 左：代币列表 */}
              <div style={{ flex:1, minWidth:0 }}>
                {tokens.length === 0 ? (
                  <EmptyState/>
                ) : (
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    <div style={{
                      display:"flex", alignItems:"center",
                      padding:"0 20px 10px",
                      fontSize:11, fontWeight:600, color:"#3a3a3a",
                      textTransform:"uppercase", letterSpacing:.08,
                      borderBottom:"1px solid #1a1a1a", marginBottom:4,
                    }}>
                      <div style={{ width:42, flexShrink:0, marginRight:14 }}/>
                      <div style={{ flex:1 }}>代币</div>
                      <div>合约地址</div>
                    </div>
                    {tokens.map(t => <TokenCard key={t.id} token={t} selected={t.id===selectedId} onClick={()=>setSelectedId(t.id)}/>)}
                  </div>
                )}
              </div>
              {/* 右：已验证作者卡片 */}
              <VerifiedAuthorCard key={selectedToken.id} verifyStatus={selectedToken.verifyStatus} earlyApplied={selectedToken.earlyApplied} walletAddress={selectedToken.wallet} onVerify={goToRewardsDiscover}/>
            </div>
          )}
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<MyTokens/>);
</script>
</body>
</html>
