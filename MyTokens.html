<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafuSkill — 我的代币</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; font-family: 'Inter','Segoe UI',sans-serif; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes dropIn  { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn   { 0%{transform:scale(.6);opacity:0} 70%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
    @keyframes fadeInUp{ from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .drop-in  { animation: dropIn  .18s ease forwards; }
    .pop-in   { animation: popIn   .45s cubic-bezier(.34,1.56,.64,1) forwards; }
    .fade-up  { animation: fadeInUp .3s ease forwards; }
    .spinner-w{ width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0; }
    .spinner-g{ width:16px;height:16px;border:2px solid rgba(34,197,94,.2);border-top-color:#22c55e;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef, useEffect } = React;

  /* ─────────────────────────────────────
     ICONS
  ───────────────────────────────────── */
  const IconGrid = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <rect x="1" y="1" width="6" height="6" rx="1.5" stroke={color} strokeWidth="1.4"/>
      <rect x="9" y="1" width="6" height="6" rx="1.5" stroke={color} strokeWidth="1.4"/>
      <rect x="1" y="9" width="6" height="6" rx="1.5" stroke={color} strokeWidth="1.4"/>
      <rect x="9" y="9" width="6" height="6" rx="1.5" stroke={color} strokeWidth="1.4"/>
    </svg>
  );
  const IconBag = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M5.5 5V4a2.5 2.5 0 015 0v1" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
      <rect x="1.5" y="5" width="13" height="9.5" rx="2" stroke={color} strokeWidth="1.4"/>
    </svg>
  );
  const IconRocket = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M8 2C8 2 11 3.5 11 8c0 1.5-.5 3-1.5 4L8 14l-1.5-2C5.5 11 5 9.5 5 8c0-4.5 3-6 3-6z" stroke={color} strokeWidth="1.4" strokeLinejoin="round"/>
      <circle cx="8" cy="7.5" r="1.2" stroke={color} strokeWidth="1.2"/>
      <path d="M5 9.5C4 10 2.5 10.5 2 12.5" stroke={color} strokeWidth="1.3" strokeLinecap="round"/>
      <path d="M11 9.5c1 .5 2.5 1 3 3" stroke={color} strokeWidth="1.3" strokeLinecap="round"/>
    </svg>
  );
  const IconDoc = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <rect x="2.5" y="1.5" width="11" height="13" rx="2" stroke={color} strokeWidth="1.4"/>
      <path d="M5 5.5h6M5 8h6M5 10.5h4" stroke={color} strokeWidth="1.3" strokeLinecap="round"/>
    </svg>
  );
  const IconUpload = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M8 2v8M8 2L5.5 4.5M8 2l2.5 2.5" stroke={color} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
      <path d="M2 10v2.5A1.5 1.5 0 003.5 14h9a1.5 1.5 0 001.5-1.5V10" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
    </svg>
  );
  const IconChart = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M2 13.5V2" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
      <path d="M2 13.5h12" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
      <rect x="4" y="8" width="2" height="5.5" rx="1" fill={color} opacity=".7"/>
      <rect x="7.5" y="5" width="2" height="8.5" rx="1" fill={color} opacity=".85"/>
      <rect x="11" y="9.5" width="2" height="4" rx="1" fill={color} opacity=".6"/>
    </svg>
  );
  const IconGear = ({ size=16, color="currentColor" }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="2.2" stroke={color} strokeWidth="1.4"/>
      <path d="M8 1.5v1.2M8 13.3v1.2M1.5 8h1.2M13.3 8h1.2M3.4 3.4l.85.85M11.75 11.75l.85.85M3.4 12.6l.85-.85M11.75 4.25l.85-.85" stroke={color} strokeWidth="1.4" strokeLinecap="round"/>
    </svg>
  );
  const IconExternalLink = ({ size=13, color="#555" }) => (
    <svg width={size} height={size} viewBox="0 0 13 13" fill="none">
      <path d="M5.5 2.5H2A1.5 1.5 0 00.5 4v7A1.5 1.5 0 002 12.5h7A1.5 1.5 0 0010.5 11V7.5" stroke={color} strokeWidth="1.3" strokeLinecap="round"/>
      <path d="M7.5 1.5h4v4" stroke={color} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
      <path d="M12 1.5L6.5 7" stroke={color} strokeWidth="1.3" strokeLinecap="round"/>
    </svg>
  );

  const GitHubIcon = ({ size=18, color="#fff" }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={color}>
      <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.3 9.42 7.88 10.95.58.1.79-.25.79-.56v-2.03c-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.69-1.28-1.69-1.04-.71.08-.7.08-.7 1.15.08 1.75 1.18 1.75 1.18 1.02 1.75 2.68 1.24 3.33.95.1-.74.4-1.24.73-1.53-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18a10.9 10.9 0 012.87-.39c.97 0 1.95.13 2.87.39 2.18-1.49 3.14-1.18 3.14-1.18.62 1.58.23 2.75.11 3.04.74.8 1.18 1.83 1.18 3.08 0 4.41-2.69 5.38-5.25 5.67.41.36.78 1.06.78 2.13v3.16c0 .31.21.67.8.56C20.71 21.41 24 17.1 24 12 24 5.65 18.85.5 12 .5z"/>
    </svg>
  );

  /* ─────────────────────────────────────
     MOCK REWARD DATA
     claimStatus: "unclaimed" | "review" | "approved"
     GitHub 来源：OAuth 登录确认 repo 所有权即可自动通过，无需人工
     ZIP 来源：需提交 repo 链接 + 声明，平台人工审核后释放
  ───────────────────────────────────── */
  const MOCK_REWARDS_INIT = [
    { id:1, name:"Code Review Agent",   icon:"🤖", source:"github",
      claimStatus:"approved",  pending:"0.0089 BNB", earned:"0.0234 BNB" },
    { id:2, name:"Translation Agent",   icon:"🌐", source:"github",
      claimStatus:"unclaimed", pending:"0.0064 BNB", earned:"0.0156 BNB" },
    { id:3, name:"Image Gen Agent",     icon:"🎨", source:"zip",
      claimStatus:"unclaimed", pending:"0.0102 BNB", earned:"0.0078 BNB" },
    { id:4, name:"Data Analysis Agent", icon:"📊", source:"zip",
      claimStatus:"rejected",  pending:"0.0047 BNB", earned:"0.0031 BNB",
      rejectReason:"提交的仓库地址与技能内容不符，请核实后重新申请" },
  ];

  /* ─────────────────────────────────────
     MOCK DISCOVER DATA (他人用你的仓库/ZIP 发行的代币)
  ───────────────────────────────────── */
  const MOCK_DISCOVER_RESULTS = [
    { id:101, name:"AI Writing Assistant", icon:"✍️", token:"AIWA",
      launchedBy:"0xd4f7...88a2", pendingBNB:"0.0312 BNB", launchDate:"2026/03/20" },
    { id:102, name:"Data Viz Skill",       icon:"📊", token:"DVIZ",
      launchedBy:"0x991c...3b5e", pendingBNB:"0.0089 BNB", launchDate:"2026/01/08" },
  ];

  /* ─────────────────────────────────────
     CLAIM MODAL
     steps: idle → connecting → main ←→ apply → submitting → main (status updated)
                                                            → submit_error → retry
     claimStatus: unclaimed | review | approved | rejected
     GitHub 来源：自动通过；ZIP 来源：人工审核
  ───────────────────────────────────── */
  function ClaimModal({ onClose = ()=>{}, pageMode = false }) {
    const [step,       setStep]     = useState("idle");
    const [skills,     setSkills]   = useState(MOCK_REWARDS_INIT);
    const [applySkill, setApply]    = useState(null);
    const [repoUrl,    setRepoUrl]  = useState("");
    const [checks,     setChecks]   = useState([false, false]);
    const [claimingId, setClaiming] = useState(null);
    const [claimedIds, setClaimed]  = useState(new Set());

    // discover tab state
    const [mainTab,            setMainTab]           = useState("mine");
    const [discoverMode,       setDiscoverMode]      = useState("github");
    const [searchRepo,         setSearchRepo]        = useState("");
    const [searchResult,       setSearchResult]      = useState(null);
    const [searching,          setSearching]         = useState(false);
    const [claimingDiscId,     setClaimingDiscId]    = useState(null);
    const [claimedDiscIds,     setClaimedDiscIds]    = useState(new Set());
    const [disputeFields,      setDisputeFields]     = useState({ skillName:"", tokenAddr:"", note:"" });
    const [disputeSubmitting,  setDisputeSubmitting] = useState(false);
    const [disputes,           setDisputes]          = useState([
      { id:"dsp0", skillName:"Data Science Helper", tokenAddr:"0x4a7c...f3e1",
        status:"rejected", rejectReason:"未找到与该合约地址匹配的 ZIP 上传记录，请确认合约地址后重试" },
    ]);

    const busy     = ["connecting","submitting"].includes(step) || claimingId !== null;
    const canClose = !busy;

    // URL validation (only for ZIP)
    const urlTouched = repoUrl.trim().length > 0;
    const urlValid   = repoUrl.trim().startsWith("https://github.com/");
    const urlError   = urlTouched && !urlValid
      ? "请输入有效的 GitHub 仓库链接（https://github.com/...）" : null;

    const ghConnect  = () => { setStep("connecting"); setTimeout(()=>setStep("main"), 2000); };

    const startApply = (s) => { setApply(s); setRepoUrl(""); setChecks([false,false]); setStep("apply"); };

    const submitApply = () => {
      setStep("submitting");
      setTimeout(() => {
        const nextStatus = applySkill.source === "github" ? "approved" : "review";
        setSkills(prev => prev.map(s =>
          s.id === applySkill.id ? { ...s, claimStatus: nextStatus, rejectReason: undefined } : s
        ));
        setApply(null); setStep("main");
      }, 1800);
    };

    // Retry after network error — preserves applySkill so user doesn't lose context
    const retrySubmit = () => {
      setStep("submitting");
      setTimeout(() => {
        const nextStatus = applySkill.source === "github" ? "approved" : "review";
        setSkills(prev => prev.map(s =>
          s.id === applySkill.id ? { ...s, claimStatus: nextStatus, rejectReason: undefined } : s
        ));
        setApply(null); setStep("main");
      }, 1800);
    };

    const claimReward = (id) => {
      if (claimingId || claimedIds.has(id)) return;
      setClaiming(id);
      setTimeout(() => { setClaimed(prev=>new Set([...prev,id])); setClaiming(null); }, 1800);
    };

    const canSubmitApply = applySkill
      ? applySkill.source === "github"
        ? true
        : urlValid && checks[0] && checks[1]
      : false;

    const S = {
      overlay: { position:"fixed", inset:0, background:"rgba(0,0,0,.8)", zIndex:800,
        display:"flex", alignItems:"center", justifyContent:"center", padding:20 },
      modal: { background:"#161616", borderRadius:14, border:"1px solid #222",
        width:"100%", maxWidth:480, boxShadow:"0 24px 60px rgba(0,0,0,.8)", overflow:"hidden" },
      hdr: { padding:"22px 24px 0", display:"flex", justifyContent:"space-between", alignItems:"flex-start" },
      body: { padding:"18px 24px 24px" },
      title: { fontSize:17, fontWeight:700, color:"#fff", marginBottom:4 },
      sub:   { fontSize:12, color:"#555" },
      closeBtn: { background:"transparent", border:"none", color:"#444", cursor:"pointer",
        fontSize:18, lineHeight:1, padding:4, marginLeft:12, flexShrink:0 },
    };

    const closeBtn = !pageMode ? <button style={S.closeBtn} onClick={onClose}>✕</button> : null;

    const steps = (<>

          {/* ── IDLE ── */}
          {step==="idle" && (<>
            <div style={S.hdr}>
              <div>
                <div style={S.title}>开发者收益认领</div>
                <div style={S.sub}>发射权与认领权分离 · 需通过 GitHub 完成身份认证</div>
              </div>
              {closeBtn}
            </div>
            <div style={S.body}>
              {/* flow steps */}
              <div style={{display:"flex",alignItems:"center",gap:0,background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:"14px 18px",marginBottom:18}}>
                {[{n:1,label:"GitHub 登录"},{n:2,label:"提交认领申请"},{n:3,label:"平台审核通过"}].map((s,i,arr)=>(
                  <React.Fragment key={s.n}>
                    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                      <div style={{width:26,height:26,borderRadius:"50%",background:"#1a1a1a",border:"1.5px solid #2e2e2e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#555"}}>{s.n}</div>
                      <div style={{fontSize:10,color:"#444",textAlign:"center",whiteSpace:"nowrap"}}>{s.label}</div>
                    </div>
                    {i<arr.length-1 && <div style={{width:20,height:1,background:"#222",flexShrink:0,marginBottom:14}}/>}
                  </React.Fragment>
                ))}
              </div>

              <button onClick={ghConnect}
                style={{width:"100%",padding:"12px",background:"#1e2327",border:"1px solid #333",borderRadius:10,
                  fontSize:14,fontWeight:600,color:"#fff",cursor:"pointer",fontFamily:"inherit",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:9,transition:"background .15s,border-color .15s"}}
                onMouseOver={e=>{e.currentTarget.style.background="#252c32";e.currentTarget.style.borderColor="#444";}}
                onMouseOut={e=>{e.currentTarget.style.background="#1e2327";e.currentTarget.style.borderColor="#333";}}>
                <GitHubIcon size={15} color="#fff"/>
                使用 GitHub 登录
              </button>
              <div style={{marginTop:9,fontSize:11,color:"#2e2e2e",textAlign:"center"}}>
                仅读取账号信息，不会访问或修改您的仓库
              </div>
            </div>
          </>)}

          {/* ── CONNECTING ── */}
          {step==="connecting" && (
            <div style={{padding:"52px 24px",display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:"#1a1a1a",border:"1px solid #222",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div className="spinner-g"/>
              </div>
              <div style={{fontSize:14,fontWeight:600,color:"#ccc"}}>正在连接 GitHub...</div>
            </div>
          )}

          {/* ── SUBMITTING ── */}
          {step==="submitting" && (
            <div style={{padding:"52px 24px",display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:"#1a1a1a",border:"1px solid #222",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div className="spinner-g"/>
              </div>
              <div style={{fontSize:14,fontWeight:600,color:"#ccc"}}>正在提交认领申请...</div>
              <div style={{fontSize:12,color:"#333"}}>请稍候，不要关闭此窗口</div>
            </div>
          )}

          {/* ── SUBMIT ERROR ── */}
          {step==="submit_error" && (
            <div style={{padding:"44px 24px",display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
              <div style={{width:48,height:48,borderRadius:"50%",background:"rgba(239,68,68,.07)",border:"1px solid rgba(239,68,68,.18)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,color:"#ef4444"}}>
                ✕
              </div>
              <div style={{fontSize:15,fontWeight:600,color:"#e0e0e0"}}>提交失败</div>
              <div style={{fontSize:12,color:"#555",textAlign:"center",lineHeight:1.7}}>
                网络异常，您的申请未提交成功<br/>请检查网络连接后重试
              </div>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <button onClick={()=>setStep("apply")}
                  style={{padding:"8px 20px",background:"transparent",border:"1px solid #2e2e2e",borderRadius:8,fontSize:13,color:"#666",cursor:"pointer",fontFamily:"inherit"}}>
                  返回修改
                </button>
                <button onClick={retrySubmit}
                  style={{padding:"8px 20px",background:"linear-gradient(135deg,#d4a017,#c9961a)",border:"none",borderRadius:8,fontSize:13,fontWeight:700,color:"#000",cursor:"pointer",fontFamily:"inherit"}}
                  onMouseOver={e=>e.currentTarget.style.opacity=".85"}
                  onMouseOut={e=>e.currentTarget.style.opacity="1"}>
                  重新提交
                </button>
              </div>
            </div>
          )}

          {/* ── MAIN: tabbed (我发布的技能 / 他人发布) ── */}
          {step==="main" && (<>
            <div style={S.hdr}>
              <div>
                <div style={S.title}>开发者收益认领</div>
                <div style={{display:"flex",alignItems:"center",gap:5,marginTop:5}}>
                  <GitHubIcon size={12} color="#555"/>
                  <span style={{fontSize:12,color:"#555"}}>@safuskill-dev</span>
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4.5" fill="#22c55e"/><path d="M2.5 5l1.6 1.6L7.5 3" stroke="#fff" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  <span style={{fontSize:11,color:"#22c55e",fontWeight:600}}>已连接</span>
                  <button onClick={()=>setStep("idle")} style={{marginLeft:4,background:"transparent",border:"none",fontSize:11,color:"#3a3a3a",cursor:"pointer",fontFamily:"inherit",padding:0}}>切换</button>
                </div>
              </div>
              {closeBtn}
            </div>
            <div style={S.body}>

              {/* Tab switcher */}
              <div style={{display:"flex",gap:2,background:"#111",borderRadius:9,padding:3,marginBottom:16,border:"1px solid #1a1a1a"}}>
                {[["mine","领取收益"],["discover","发现认领"]].map(([key,label])=>(
                  <button key={key} onClick={()=>setMainTab(key)}
                    style={{flex:1,padding:"7px",borderRadius:7,border:"none",fontSize:12,fontWeight:mainTab===key?700:400,cursor:"pointer",fontFamily:"inherit",
                      background:mainTab===key?"#1e1e1e":"transparent",
                      color:mainTab===key?"#d4a017":"#555",transition:"all .15s"}}>
                    {label}
                  </button>
                ))}
              </div>

              {/* ─── 我发布的技能 ─── */}
              {mainTab==="mine" && (<>
                <div style={{fontSize:11,color:"#333",marginBottom:12,letterSpacing:.05}}>
                  开发者奖励 = 交易税费的 70%，发射代币不等于自动获得奖励，需通过认领申请
                </div>
                {skills.map(r => {
                  const isClaiming = claimingId === r.id;
                  const isClaimed  = claimedIds.has(r.id);
                  const isRejected = r.claimStatus === "rejected";
                  return (
                    <div key={r.id} style={{padding:"12px 0",borderBottom:"1px solid #1a1a1a",background:isRejected?"rgba(239,68,68,.02)":"transparent"}}>
                      <div style={{display:"flex",alignItems:"center",gap:11}}>
                        <div style={{width:34,height:34,borderRadius:9,background:isRejected?"rgba(239,68,68,.07)":"#1a1a1a",border:`1px solid ${isRejected?"rgba(239,68,68,.18)":"#222"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>
                          {r.icon}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:500,color:"#d0d0d0",marginBottom:2}}>{r.name}</div>
                          <div style={{fontSize:11,color:"#3a3a3a"}}>{r.source==="zip"?"社区上传":"GitHub 来源"} · 累计 {r.earned}</div>
                        </div>
                        {r.claimStatus==="unclaimed" && (
                          <button onClick={()=>startApply(r)}
                            style={{fontSize:12,fontWeight:600,color:"#d4a017",background:"rgba(212,160,23,.07)",border:"1px solid rgba(212,160,23,.18)",borderRadius:7,padding:"5px 13px",cursor:"pointer",fontFamily:"inherit",flexShrink:0,whiteSpace:"nowrap"}}
                            onMouseOver={e=>e.currentTarget.style.background="rgba(212,160,23,.14)"}
                            onMouseOut={e=>e.currentTarget.style.background="rgba(212,160,23,.07)"}>
                            申请认领
                          </button>
                        )}
                        {r.claimStatus==="review" && (
                          <div style={{fontSize:11,color:"#7a6020",background:"rgba(212,160,23,.06)",border:"1px solid rgba(212,160,23,.14)",borderRadius:6,padding:"4px 11px",flexShrink:0,display:"flex",alignItems:"center",gap:5}}>
                            <div className="spinner-g" style={{width:9,height:9,borderWidth:1.5,borderTopColor:"#a07012",borderColor:"rgba(160,112,18,.2)"}}/>
                            审核中
                          </div>
                        )}
                        {r.claimStatus==="rejected" && (
                          <button onClick={()=>startApply(r)}

          {isRewards   && <ClaimModal pageMode={true}/>}
          {isTokens    && (
            <div style={{ padding:"28px 36px", flex:1 }}>
              {tokens.length === 0 ? (
                <EmptyState/>
              ) : (
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  <div style={{
                    display:"flex", alignItems:"center",
                    padding:"0 20px 10px",
                    fontSize:11, fontWeight:600, color:"#3a3a3a",
                    textTransform:"uppercase", letterSpacing:.08,
                    borderBottom:"1px solid #1a1a1a", marginBottom:4,
                  }}>
                    <div style={{ width:42, flexShrink:0, marginRight:14 }}/>
                    <div style={{ flex:1 }}>代币</div>
                    <div>合约地址</div>
                  </div>
                  {tokens.map(t => <TokenCard key={t.id} token={t}/>)}
                </div>
              )}
            </div>
          )}
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<MyTokens/>);
</script>
</body>
</html>
